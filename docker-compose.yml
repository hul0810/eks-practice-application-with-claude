networks:
  eks-app:
    driver: bridge

services:
  product-service:
    build:
      context: ./services/product-service
    ports:
      - "8001:8001"
    environment:
      APP_VERSION: "v1"
      APP_PORT: "8001"
      OTLP_ENDPOINT: "http://host.docker.internal:4317"
    networks:
      - eks-app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  order-service:
    build:
      context: ./services/order-service
    ports:
      - "8002:8002"
    environment:
      APP_VERSION: "v1"
      APP_PORT: "8002"
      OTLP_ENDPOINT: "http://host.docker.internal:4317"
      PRODUCT_SERVICE_URL: "http://product-service:8001"
    networks:
      - eks-app
    depends_on:
      product-service:
        condition: service_healthy

  api-gateway:
    build:
      context: ./services/api-gateway
    ports:
      - "8000:8000"
    environment:
      APP_VERSION: "v1"
      APP_PORT: "8000"
      OTLP_ENDPOINT: "http://host.docker.internal:4317"
      PRODUCT_SERVICE_URL: "http://product-service:8001"
      ORDER_SERVICE_URL: "http://order-service:8002"
    networks:
      - eks-app
    depends_on:
      product-service:
        condition: service_healthy
