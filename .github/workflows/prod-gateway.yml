name: prod-gateway

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "빌드할 git ref (기본: main)"
        required: false
        default: "main"

jobs:
  call:
    uses: ./.github/workflows/_prod-release.yml
    with:
      service: gateway
      ecr_repo: eks-practice-api-gateway-prod
      ref: ${{ github.event.inputs.ref }}
      role_arn: arn:aws:iam::657231015203:role/eks-practice-gateway-github
