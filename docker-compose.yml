networks:
  eks-app:
    driver: bridge

services:
  catalog:
    build:
      context: ./services/catalog
    ports:
      - "8001:8001"
    environment:
      APP_PORT: "8001"
      OTLP_ENDPOINT: "http://host.docker.internal:4317"
    networks:
      - eks-app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  order:
    build:
      context: ./services/order
    ports:
      - "8002:8002"
    environment:
      APP_PORT: "8002"
      OTLP_ENDPOINT: "http://host.docker.internal:4317"
      CATALOG_URL: "http://catalog:8001"
    networks:
      - eks-app
    depends_on:
      catalog:
        condition: service_healthy

  gateway:
    build:
      context: ./services/gateway
    ports:
      - "8000:8000"
    environment:
      APP_PORT: "8000"
      OTLP_ENDPOINT: "http://host.docker.internal:4317"
      CATALOG_URL: "http://catalog:8001"
      ORDER_URL: "http://order:8002"
    networks:
      - eks-app
    depends_on:
      catalog:
        condition: service_healthy
