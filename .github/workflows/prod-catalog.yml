name: prod-catalog

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "빌드할 git ref (기본: main)"
        required: false
        default: "main"

jobs:
  call:
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/_prod-release.yml
    with:
      service: catalog
      ecr_repo: eks-practice-catalog-prod
      ref: ${{ github.event.inputs.ref }}
      role_arn: "arn:aws:iam::657231015203:role/eks-practice-catalog-github"
