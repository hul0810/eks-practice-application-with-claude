name: _dev-build

# dev 환경 공통 빌드/push 로직 (재사용 워크플로우).
# 호출부: dev-gateway.yml, dev-catalog.yml, dev-order.yml
# 항상 수동(workflow_dispatch)으로만 트리거되며, 지정한 ref를 빌드해서
# latest 태그 + ref명 태그, 2개를 동시에 push한다.

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string
      ecr_repo:
        required: true
        type: string
      ref:
        required: true
        type: string
      role_arn:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - id: tag
        run: |
          BRANCH_TAG=$(echo "${{ inputs.ref }}" | tr '/' '-')
          echo "branch_tag=$BRANCH_TAG" >> "$GITHUB_OUTPUT"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.role_arn }}
          aws-region: ap-northeast-2

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr-login

      - name: Build & push (latest + branch tag)
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          REPO: ${{ inputs.ecr_repo }}
          BRANCH_TAG: ${{ steps.tag.outputs.branch_tag }}
        run: |
          docker build \
            -t "$REGISTRY/$REPO:latest" \
            -t "$REGISTRY/$REPO:$BRANCH_TAG" \
            services/${{ inputs.service }}/
          docker push "$REGISTRY/$REPO:latest"
          docker push "$REGISTRY/$REPO:$BRANCH_TAG"
